<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Anomaly Radar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* A little extra styling for our new chart container */
        #chart-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 30px auto;
            border: 1px solid var(--border-color);
            padding: 20px;
            background-color: #050505;
        }
    </style>
</head>
<body>
    <div id="main-layout">
        <h1>SECURITY COMMAND CENTER</h1>
        
        <div id="stats-bar">
            <div class="stat-card">🛡️ REVENUE PROTECTED: <span id="stat-revenue">$0</span></div>
            <div class="stat-card">🚨 FRAUD BLOCKED: <span id="stat-count">0</span></div>
        </div>

        <div id="chart-container">
            <canvas id="radarChart"></canvas>
        </div>
            
        <div id="warmup-container">
            <div id="warmup-bar"></div>
            <div id="warmup-text">CALIBRATING NEURAL ENGINE: 0%</div>
        </div>

        <div id="radar-container">
            <div id="feed"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const feed = document.getElementById('feed');

        // --- NEW: Better Feedback Function ---
        function sendFeedback(id, amount, method, isActualFraud, elementId) {
            // Target the specific button container using its unique ID
            const container = document.getElementById(`actions-${id}`);
            container.innerHTML = `<span style="color: #ffb86c; font-size: 0.8rem;">Syncing Brain...</span>`;

            fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, amount, method, is_fraud: isActualFraud })
            })
            .then(res => res.json())
            .then(data => {
                // Update the stats bar with live data from server
                document.getElementById('stat-revenue').innerText = `$${data.stats.revenue_saved.toLocaleString()}`;
                document.getElementById('stat-count').innerText = data.stats.fraud_detected;
                container.innerHTML = `<span style="color: #00ff41; font-size: 0.8rem;">✓ Model Retrained</span>`;
            });
        }

        socket.on('new_transaction', (data) => {
            const div = document.createElement('div');
            div.className = data.is_anomaly ? 'entry anomaly' : 'entry';
            
            // Give each transaction its own unique ID for the action buttons
            const actionId = `actions-${data.transaction_id}`;

            let actionHtml = '';
            if (data.is_anomaly) {
                actionHtml = `
                    <div id="${actionId}" class="action-buttons">
                        <button onclick="sendFeedback('${data.transaction_id}', ${data.amount}, '${data.payment_method}', true, '${actionId}')" class="btn-confirm">Confirm Fraud</button>
                        <button onclick="sendFeedback('${data.transaction_id}', ${data.amount}, '${data.payment_method}', false, '${actionId}')" class="btn-ignore">False Alarm</button>
                    </div>
                `;
            }

            div.innerHTML = `
                <span><strong>ID:</strong> ${data.transaction_id.slice(0,5)}</span>
                <span><strong>AMT:</strong> $${data.amount}</span>
                <span><strong>METHOD:</strong> ${data.payment_method.toUpperCase()}</span>
                ${actionHtml}
            `;
            feed.prepend(div);
            
            // (Keep your Chart.js update logic here as well)
        });

        socket.on('warmup_update', (data) => {
        document.getElementById('mode').innerText = "Calibrating...";
        const bar = document.getElementById('warmup-bar');
        const text = document.getElementById('warmup-text');
        
        bar.style.width = data.progress + "%";
        text.innerText = `CALIBRATING NEURAL ENGINE: ${Math.round(data.progress)}% (${data.current}/${data.total})`;
    });

    socket.on('warmup_finished', () => {
        document.getElementById('mode').innerText = "Active Detection";
        // Hide the warmup bar after it finishes
        document.getElementById('warmup-container').style.display = 'none';
    });
    </script>
</body>
</html>
